<!doctype html>
<html lang="ja"><head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>桟橋荷役 点検ポータル</title>
  <style>
    :root {
      --blue: #1f67c7;
      --blue-dark: #0f3e88;
      --sky: #eaf5ff;
      --line: #d8e6f3;
      --text: #22324a;
      --muted: #64748b;
      --card: #ffffff;
      --shadow: 0 14px 40px rgba(31, 103, 199, 0.10);
      --radius-xl: 28px;
      --radius-lg: 20px;
      --radius-md: 14px;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Segoe UI", "Yu Gothic UI", "Hiragino Sans", sans-serif;
      background: linear-gradient(180deg, #f4faff 0%, #eef7ff 100%);
      color: var(--text);
    }

    a { color: inherit; text-decoration: none; }

    .container {
      max-width: 1240px;
      margin: 0 auto;
      padding: 24px;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 18px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 14px;
      font-weight: 700;
      color: var(--blue-dark);
    }

    .brand-mark {
      width: 52px;
      height: 52px;
      border-radius: 50%;
      border: 2px solid var(--blue-dark);
      display: grid;
      place-items: center;
      font-size: 28px;
      background: rgba(255,255,255,0.7);
    }

    .guide-btn {
      border: none;
      background: rgba(31,103,199,0.10);
      color: var(--blue-dark);
      border-radius: 999px;
      padding: 14px 20px;
      font-weight: 700;
      cursor: pointer;
    }

    .hero {
      position: relative;
      min-height: 470px;
      border-radius: 36px;
      overflow: hidden;
      box-shadow: var(--shadow);
      background: #d8ecff;
    }

    .hero img {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .hero::after {
      content: "";
      position: absolute;
      inset: 0;
      background:
        linear-gradient(90deg, rgba(255,255,255,0.92) 0%, rgba(255,255,255,0.80) 28%, rgba(255,255,255,0.18) 58%, rgba(255,255,255,0.00) 78%),
        linear-gradient(180deg, rgba(255,255,255,0.18), rgba(255,255,255,0.02));
    }

    .hero-content {
      position: relative;
      z-index: 1;
      padding: 56px 44px;
      width: min(520px, 100%);
    }

    .hero h1 {
      margin: 0;
      font-size: clamp(34px, 5vw, 64px);
      line-height: 1.15;
      color: var(--blue-dark);
      letter-spacing: 0.02em;
    }

    .hero p {
      margin: 22px 0 28px;
      font-size: 18px;
      line-height: 1.8;
      color: #334155;
    }

    .search-card {
      background: rgba(255,255,255,0.84);
      backdrop-filter: blur(8px);
      border: 1px solid rgba(255,255,255,0.8);
      border-radius: var(--radius-xl);
      box-shadow: 0 16px 36px rgba(15,62,136,0.10);
      padding: 24px;
    }

    .search-label {
      display: block;
      font-weight: 700;
      margin-bottom: 12px;
      color: var(--blue-dark);
    }

    .search-row {
      display: flex;
      gap: 10px;
    }

    .search-row input {
      flex: 1;
      height: 54px;
      border-radius: 14px;
      border: 1px solid #bfd6ef;
      padding: 0 16px;
      font-size: 16px;
      outline: none;
      background: #fff;
    }

    .search-row button {
      min-width: 70px;
      border: none;
      border-radius: 14px;
      background: linear-gradient(180deg, #2878df, #1f67c7);
      color: #fff;
      font-size: 22px;
      cursor: pointer;
    }

    .search-note {
      margin: 12px 0 0;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.6;
    }

    .section-title {
      display: flex;
      align-items: center;
      gap: 14px;
      justify-content: center;
      margin: 34px 0 22px;
      color: var(--blue-dark);
      font-size: 18px;
      font-weight: 800;
    }

    .section-title::before,
    .section-title::after {
      content: "";
      height: 2px;
      width: 120px;
      background: #bdd3ea;
      border-radius: 999px;
    }

    .cards {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 18px;
    }

    .card {
      background: var(--card);
      border: 1px solid #e7eef6;
      border-radius: 22px;
      padding: 26px 20px;
      box-shadow: 0 10px 26px rgba(30, 64, 175, 0.06);
      transition: transform .2s ease, box-shadow .2s ease;
      min-height: 255px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    .card:hover {
      transform: translateY(-4px);
      box-shadow: 0 18px 34px rgba(30, 64, 175, 0.11);
    }

    .icon-wrap {
      width: 110px;
      height: 110px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      margin: 0 auto 18px;
      font-size: 44px;
      font-weight: 700;
    }

    .blue { background: #e9f2ff; color: #2d6fe3; }
    .green { background: #edf7eb; color: #53a74d; }
    .orange { background: #fff4df; color: #e8ac22; }
    .purple { background: #f1ebff; color: #9466ef; }
    .cyan { background: #e9f7fb; color: #3ca4c4; }

    .card h3 {
      text-align: center;
      font-size: 18px;
      margin: 0 0 10px;
      color: var(--blue-dark);
    }

    .card p {
      text-align: center;
      margin: 0;
      color: #475569;
      line-height: 1.8;
      font-size: 14px;
    }

    .card .card-link {
      align-self: flex-end;
      width: 38px;
      height: 38px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      font-size: 20px;
      border: 2px solid currentColor;
      margin-top: 18px;
    }

    .lower-grid {
      display: grid;
      grid-template-columns: 2.1fr 0.9fr;
      gap: 22px;
      margin-top: 26px;
    }

    .panel {
      background: #fff;
      border: 1px solid #e5edf6;
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 0 8px 22px rgba(15, 62, 136, 0.06);
    }

    .panel-header {
      padding: 18px 22px;
      border-bottom: 1px solid #ebf1f7;
      font-weight: 800;
      color: var(--blue-dark);
      font-size: 18px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .panel-body {
      padding: 20px 22px 28px;
    }

    .candidate-box {
      border: 2px dashed #c9d8e8;
      border-radius: 16px;
      min-height: 150px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #8aa0b6;
      text-align: center;
      padding: 20px;
      background: #fcfdff;
    }

    .favorite {
      background: linear-gradient(180deg, #1f67c7 0%, #1756ab 100%);
      color: white;
    }

    .favorite .panel-header {
      color: white;
      border-bottom-color: rgba(255,255,255,0.12);
    }

    .favorite-card {
      background: rgba(255,255,255,0.14);
      border-radius: 16px;
      min-height: 116px;
      display: grid;
      place-items: center;
      text-align: center;
      padding: 18px;
      color: #e4efff;
      line-height: 1.8;
    }

    .notice {
      margin-top: 22px;
      background: rgba(255,255,255,0.78);
      border: 1px solid #e0eaf5;
      border-radius: 18px;
      display: grid;
      grid-template-columns: 1.2fr 0.8fr;
      gap: 14px;
      padding: 18px 22px;
      align-items: center;
      color: var(--blue-dark);
    }

    .notice small {
      color: #475569;
      font-size: 14px;
    }

    .notice-right {
      text-align: right;
      font-weight: 700;
      line-height: 1.8;
    }

    footer {
      text-align: center;
      color: #64748b;
      font-size: 13px;
      margin: 18px 0 8px;
    }

    @media (max-width: 1100px) {
      .cards { grid-template-columns: repeat(3, 1fr); }
      .lower-grid, .notice { grid-template-columns: 1fr; }
    }

    @media (max-width: 760px) {
      .container { padding: 14px; }
      .hero { min-height: auto; }
      .hero-content { width: 100%; padding: 28px 20px; }
      .hero::after {
        background: linear-gradient(180deg, rgba(255,255,255,0.92) 0%, rgba(255,255,255,0.86) 35%, rgba(255,255,255,0.55) 100%);
      }
      .search-row { flex-direction: column; }
      .cards { grid-template-columns: 1fr; }
      .topbar { flex-direction: column; gap: 12px; align-items: flex-start; }
      .section-title::before, .section-title::after { width: 50px; }
    }

    .chatbot-shell {
      position: fixed;
      right: 24px;
      bottom: 24px;
      z-index: 1000;
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 12px;
    }

    .chatbot-panel {
      width: min(360px, calc(100vw - 28px));
      background: rgba(255,255,255,0.98);
      border: 1px solid #dce8f4;
      border-radius: 22px;
      box-shadow: 0 18px 44px rgba(15, 62, 136, 0.18);
      overflow: hidden;
    }

    .chatbot-panel[hidden] {
      display: none;
    }

    .chatbot-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 16px 18px;
      background: linear-gradient(180deg, #2878df, #1f67c7);
      color: #fff;
    }

    .chatbot-title {
      font-size: 16px;
      font-weight: 800;
      line-height: 1.4;
    }

    .chatbot-status {
      display: block;
      margin-top: 2px;
      font-size: 12px;
      font-weight: 500;
      opacity: 0.9;
    }

    .chatbot-close {
      border: none;
      background: rgba(255,255,255,0.16);
      color: #fff;
      width: 34px;
      height: 34px;
      border-radius: 50%;
      font-size: 18px;
      cursor: pointer;
    }

    .chatbot-body {
      padding: 18px;
      background: #f8fbff;
    }

    .chatbot-message {
      margin: 0 0 16px;
      padding: 14px 16px;
      border-radius: 16px 16px 16px 6px;
      background: #fff;
      border: 1px solid #e2ebf5;
      color: #334155;
      line-height: 1.7;
      font-size: 14px;
    }

    .chatbot-input-row {
      display: flex;
      gap: 10px;
    }

    .chatbot-input {
      flex: 1;
      height: 46px;
      border: 1px solid #c7d7e8;
      border-radius: 14px;
      padding: 0 14px;
      font-size: 14px;
      background: #fff;
      outline: none;
    }

    .chatbot-send {
      border: none;
      border-radius: 14px;
      min-width: 64px;
      padding: 0 16px;
      background: #1f67c7;
      color: #fff;
      font-weight: 700;
      cursor: pointer;
    }

    .chatbot-note {
      margin: 10px 0 0;
      font-size: 12px;
      color: #64748b;
      line-height: 1.6;
    }

    .chatbot-toggle {
      border: none;
      border-radius: 999px;
      padding: 14px 18px;
      background: linear-gradient(180deg, #2878df, #1f67c7);
      color: #fff;
      box-shadow: 0 16px 34px rgba(31, 103, 199, 0.24);
      font-weight: 800;
      font-size: 15px;
      cursor: pointer;
    }

    @media (max-width: 760px) {
      .chatbot-shell {
        right: 14px;
        bottom: 14px;
        left: 14px;
      }

      .chatbot-panel {
        width: 100%;
      }

      .chatbot-toggle {
        align-self: flex-end;
      }
    }
  </style>

<body>
  <div class="container">
    <div class="topbar">
      <div class="brand">
        <div class="brand-mark">⚓</div>
        <div>桟橋荷役作業 点検ポータル</div>
      </div>
      <button class="guide-btn" type="button">使い方ガイド</button>
    </div>

    <section class="hero">
      <img src="assets/hero.webp" alt="Pier portal hero image" decoding="async" fetchpriority="high">
      <div class="hero-content">
        <h1>各種点検表一覧</h1>
        

        <div class="search-card">
          <label class="search-label" for="siteName">バース名または点検表名を入力してください</label>
          <div class="search-row">
            <input id="siteName" type="text" placeholder="例）〇〇バース、点検表名" autocomplete="off">
            <button type="button">⌕</button>
          </div>
          
        </div>
      </div>
    </section><div class="panel" data-pier-portal-moved="true">
        <div class="panel-header"><span>🔎</span><span>バース名・点検表から探す<br>（候補一覧）</span></div>
        <div class="panel-body">
          
          <div class="candidate-box">
            <div>
              <div style="font-size:44px;margin-bottom:10px;">📋</div>
              バース名または点検表名を入力して検索してください
            </div>
          </div>
        </div>
      </div><section class="cards" data-pier-portal-moved="true">
      <a class="card" href="#" data-link-slot="card-1" data-pier-category-slot="card-1" data-pier-category-title="受入・荷役関連" aria-label="受入・荷役関連 の書類一覧を開く">
        <div>

          const input = document.getElementById("siteName");

          };

          const findExact = () => {
            const key = normalize(input.value);

          const getLeadingNumber = (value) => {
            const match = String(value || "").trim().match(/^\d+/);
            return match ? match[0] : "";
          };

          const getMatches = (key) => {
            const isNumeric = /^\d+$/.test(key);
            const seen = new Set();
            return sheets.filter((item) => {
              const name = normalize(item.name);
              const matched = isNumeric
                ? getLeadingNumber(item.name) === key
                : name.includes(key);
              if (!matched) return false;

              const uniqueKey = normalize(item.url || item.name);
              if (seen.has(uniqueKey)) return false;

          const close = () => modal.classList.remove("is-visible");
          const openSheet = (item) => window.open(item.url, "_blank", "noopener,noreferrer");

          const renderItems = (items, emptyText) => {
            list.innerHTML = "";
            if (!items.length) {
              const empty = document.createElement("p");
              empty.className = "pier-category-empty";
              empty.textContent = emptyText || "この条件に一致する書類はありません。";
              list.appendChild(empty);
              return;
            }

            items.forEach((item) => {
              const button = document.createElement("button");
              button.type = "button";
              button.className = "pier-category-item";
              button.textContent = item.name;
              button.addEventListener("click", () => openSheet(item));
              list.appendChild(button);
            });
          };

          const openCategory = (category) => {
            title.textContent = category.title;
            list.innerHTML = "";

            if (!category.items.length) {
              const empty = document.createElement("p");
              empty.className = "pier-category-empty";
              empty.textContent = "このカテゴリにはまだ書類が登録されていません。";
              list.appendChild(empty);
            } else if (category.useFolders && category.folders.length) {

                button.className = "pier-category-item";
                button.textContent = folder.name;
                button.addEventListener("click", () => {
                  title.textContent = category.title + " / " + folder.name;
                  const folderItems = category.items.filter((item) => item.folderId === folder.id);
                  list.innerHTML = "";

                  const back = document.createElement("button");
                  back.type = "button";
                  back.className = "pier-category-item";
                  back.textContent = "フォルダー一覧に戻る";

                  const holder = document.createElement("div");
                  holder.className = "pier-category-list";
                  holder.style.padding = "0";
                  list.appendChild(holder);

                  const originalList = list;
                  list = holder;
                  renderItems(folderItems, "このフォルダーにはまだ書類が登録されていません。");
                  list = originalList;
                });
                list.appendChild(button);

              const noFolderItems = category.items.filter((item) => !item.folderId);
